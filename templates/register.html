{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow p-4 border-0">
            <h3 class="text-center mb-4 fw-bold text-primary">Регистрация профиля</h3>

            <form method="POST" enctype="multipart/form-data">
                <!-- Поле Логин -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Придумайте логин</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="Напр: ivan_traveler" required>
                </div>

                <!-- Поле Пароль -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Придумайте пароль</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                </div>

                <!-- Поле О себе -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Расскажите о себе (Bio)</label>
                    <textarea name="bio" class="form-control" rows="3" placeholder="Какие города вы любите?"></textarea>
                </div>

                <!-- Поле Аватарка -->
                <div class="mb-4">
                    <label class="form-label fw-bold">Фото профиля</label>
                    <input type="file" name="avatar" class="form-control" accept="image/*">
                    <div class="form-text">Будет отображаться в вашем профиле и отчетах.</div>
                </div>

                <!-- Кнопка отправки -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg shadow-sm">Создать аккаунт</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small">Уже есть аккаунт? <a href="/login" class="text-decoration-none">Войти в систему</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
