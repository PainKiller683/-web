{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4 shadow border-top border-success border-4">
            <h3 class="text-center mb-4">Новый аккаунт</h3>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Придумайте логин" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Придумайте пароль" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2">Создать аккаунт</button>
            </form>
            <div class="text-center mt-3">
                <small>Уже есть профиль? <a href="/login">Войти</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
