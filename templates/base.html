<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://yastatic.net" rel="stylesheet">
    <style>body{background:#f4f7f6}.navbar{margin-bottom:2rem}.card{border:none;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05)}</style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">📍 TravelDash 2026</a>
            <div class="navbar-nav ms-auto flex-row align-items-center">
                {% if current_user.is_authenticated %}
                <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}" class="rounded-circle me-2" width="30" height="30" style="object-fit:cover">
                <a class="btn btn-sm btn-light" href="/logout">Выйти</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
