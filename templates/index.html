{% extends "base.html" %}
{% block content %}
<div class="row mb-4">
    <div class="col-12 card p-3 d-flex flex-row align-items-center">
        <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}" class="rounded-circle me-4 shadow" width="100" height="100" style="object-fit:cover">
        <div><h3>{{ current_user.username }}</h3><p class="text-muted mb-0">{{ current_user.bio }}</p></div>
    </div>
</div>
<div class="row">
    <div class="col-md-4">
        <div class="card p-4 mb-3">
            <h5>Новый план</h5>
            <form action="/add_trip" method="POST">
                <input type="text" name="city_from" class="form-control mb-2" placeholder="Откуда" required>
                <input type="text" name="city_to" class="form-control mb-2" placeholder="Куда" required>
                <input type="number" name="budget_limit" class="form-control mb-2" placeholder="Бюджет">
                <input type="number" name="days_count" class="form-control mb-3" placeholder="Дней">
                <button class="btn btn-primary w-100">Добавить</button>
            </form>
        </div>
        <div class="card p-3 shadow-sm border-dashed">
            <h6 class="small fw-bold">Импорт / Экспорт CSV</h6>
            <form action="/import" method="POST" enctype="multipart/form-data" class="mb-2">
                <input type="file" name="file" class="form-control form-control-sm mb-2" required>
                <button class="btn btn-sm btn-outline-primary w-100">Загрузить CSV</button>
            </form>
            <a href="/export" class="btn btn-sm btn-outline-success w-100">Скачать CSV</a>
        </div>
    </div>
    <div class="col-md-8">
        <input type="text" id="search" class="form-control mb-4 shadow-sm" placeholder="Искать город назначения...">
        <div id="list" class="row"></div>
    </div>
</div>
<script>
    const s = document.getElementById('search'), l = document.getElementById('list');
    const update = async () => {
        const res = await fetch(`/api/my_trips?q=${s.value}`);
        const data = await res.json();
        l.innerHTML = data.map(t => `
            <div class="col-md-6 mb-3">
                <div class="card p-3">
                    <h5 class="text-primary">${t.from} → ${t.to}</h5>
                    <p class="small text-muted mb-2">Бюджет: ${t.budget} ₽</p>
                    <a href="/trip/${t.id}" class="btn btn-sm btn-primary">Детали путешествия</a>
                </div>
            </div>
        `).join('');
    };
    s.oninput = update; window.onload = update;
</script>
{% endblock %}
