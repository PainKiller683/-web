<!-- Вставь это в левую колонку под основной формой -->
<div class="card p-3 shadow-sm mt-3 border-dashed">
    <h6 class="small fw-bold text-muted">Массовый импорт (CSV)</h6>
    <form action="/import" method="POST" enctype="multipart/form-data">
        <div class="input-group input-group-sm mb-2">
            <input type="file" name="file" class="form-control" accept=".csv" required>
        </div>
        <button type="submit" class="btn btn-sm btn-outline-primary w-100">Загрузить список</button>
    </form>
    <div class="mt-2" style="font-size: 0.7rem; color: #999;">
        Формат: Откуда, Куда, Бюджет, Дни
    </div>
</div>

{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card p-4 shadow-sm">
            <h5 class="fw-bold mb-3">Новое путешествие</h5>
            <form action="/add_trip" method="POST">
                <input type="text" name="city_from" class="form-control mb-2" placeholder="Откуда (напр. Москва)" required>
                <input type="text" name="city_to" class="form-control mb-2" placeholder="Куда (напр. Казань)" required>
                <input type="number" name="budget_limit" class="form-control mb-2" placeholder="Бюджет (₽)">
                <input type="number" name="days_count" class="form-control mb-3" placeholder="Кол-во дней">
                <button type="submit" class="btn btn-primary w-100">Создать маршрут</button>
            </form>
        </div>
    </div>
    <div class="col-md-8">
        <input type="text" id="search" class="form-control mb-4" placeholder="Поиск по городам...">
        <div id="tripsList" class="row"></div>
    </div>
</div>

<script>
    const search = document.getElementById('search');
    const list = document.getElementById('tripsList');

    const load = async () => {
        const res = await fetch(`/api/my_trips?q=${search.value}`);
        const data = await res.json();
        list.innerHTML = data.map(t => `
            <div class="col-md-6 mb-3">
                <div class="card p-3 shadow-sm border-0">
                    <h5 class="text-primary">${t.city_from} → ${t.city_to}</h5>
                    <p class="small text-muted mb-2">Бюджет: ${t.budget} ₽</p>
                    <a href="/trip/${t.id}" class="btn btn-sm btn-outline-primary">Посмотреть детали</a>
                </div>
            </div>
        `).join('');
    };
    search.oninput = load;
    window.onload = load;
</script>
{% endblock %}
