{% extends "base.html" %}
{% block content %}

<!-- СЕКЦИЯ ПРОФИЛЯ -->
<div class="card p-4 shadow-sm mb-4 bg-white border-0">
    <div class="d-flex align-items-center">
        <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}"
             class="rounded-circle border border-3 border-primary me-4"
             style="width: 80px; height: 80px; object-fit: cover;">
        <div>
            <h2 class="mb-0">{{ current_user.username }}</h2>
            <p class="text-muted">{{ current_user.bio or "Мои путешествия 2026" }}</p>
        </div>
    </div>
</div>

<div class="row">
    <!-- ФОРМА: ВЫГРУЗКА В БД -->
    <div class="col-md-4">
        <div class="card p-4 shadow-sm border-0">
            <h5 class="fw-bold mb-3">Спланировать поездку</h5>
            <form action="/add_trip" method="POST" enctype="multipart/form-data">
                <input type="text" name="city" class="form-control mb-3" placeholder="Город" required>
                <div class="input-group mb-3">
                    <span class="input-group-text">₽</span>
                    <input type="number" name="budget_limit" class="form-control" placeholder="Бюджет">
                </div>
                <input type="file" name="ticket" class="form-control mb-3">
                <button type="submit" class="btn btn-primary w-100 fw-bold">Сохранить</button>
            </form>
            <div class="mt-3 d-flex justify-content-between align-items-center">
                <a href="/export" class="btn btn-sm btn-outline-success">Выгрузить в CSV</a>
                <!-- Иконка/Картинка пользователя рядом с отчетом -->
                <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}"
                     style="width: 30px; height: 30px; object-fit: cover;" class="rounded">
            </div>
        </div>
    </div>

    <!-- СПИСОК: ПОКАЗАТЬ ПУТЕШЕСТВИЕ -->
    <div class="col-md-8">
        <input type="text" id="search" class="form-control form-control-lg mb-4 shadow-sm" placeholder="Искать город...">

        <div id="tripsList" class="row">
            <!-- Карточки появятся здесь -->
        </div>
    </div>
</div>

<script>
    const tripsList = document.getElementById('tripsList');
    const search = document.getElementById('search');

    const renderTrips = async () => {
        const res = await fetch(`/api/my_trips?q=${search.value}`);
        const data = await res.json();

        tripsList.innerHTML = data.map(trip => `
            <div class="col-md-6 mb-3">
                <div class="card h-100 shadow-sm border-0 p-3">
                    <div class="d-flex justify-content-between">
                        <h5 class="fw-bold text-primary">${trip.city}</h5>
                        <span class="badge bg-light text-dark">${trip.budget} ₽</span>
                    </div>
                    <hr class="my-2">
                    ${trip.file ?
                        `<a href="/static/uploads/${trip.file}" target="_blank" class="btn btn-sm btn-outline-dark">Посмотреть файл</a>` :
                        `<small class="text-muted">Файл не прикреплен</small>`
                    }
                </div>
            </div>
        `).join('');
    };

    search.oninput = renderTrips;
    window.onload = renderTrips;
</script>
{% endblock %}
